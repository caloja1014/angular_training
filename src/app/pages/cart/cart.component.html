<div class="cart-page">
  <h2>Your Cart</h2>
  @if (cartService.items().length === 0) {
  <p>Your cart is empty.</p>
  }
  @else {
  @for (item of cartService.items(); track item.Product.id) {
  <app-product-cart [cartItem]="item" (onRemove)="cartService.removeFromCart($event)"></app-product-cart>
  }
  }

</div>
